name: Build and Publish Docker Image

on:
  push:
    branches: [ "main" ]
    paths:
      - 'Dockerfile'
      - 'config.json'
      - 'start.sh'
      - '.github/workflows/build.yml'
  workflow_dispatch:
    inputs:
      sing_box_version:
        description: 'Sing-box version (e.g., 1.10.1)'
        required: true
        default: '1.10.1'
      cloudflared_version:
        description: 'Cloudflared version (e.g., 2024.4.1)'
        required: true
        default: '2024.4.1'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        platform: 
          - linux/amd64
          - linux/arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha
            type=ref,event=branch

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SING_BOX_VERSION=${{ github.event.inputs.sing_box_version || '1.10.1' }}
            CLOUDFLARED_VERSION=${{ github.event.inputs.cloudflared_version || '2024.4.1' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max